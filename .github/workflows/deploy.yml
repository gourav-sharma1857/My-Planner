name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers every time you push to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Secret Keys into config.js
        run: |
          echo "${{ secrets.FIREBASE_CONFIG_DATA }}" > config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the entire root directory including the newly generated config.js

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4